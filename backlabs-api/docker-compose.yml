version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: backlabs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backlabs_db
    ports:
      - "1228:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: